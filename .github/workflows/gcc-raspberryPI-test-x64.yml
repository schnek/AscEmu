name: AscEmu CI (Linux ARM64/Raspberry Pi::gcc)

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ develop ]

# Native Linux ARM64 runner. Suitable for Raspberry Pi OS 64-bit / Ubuntu ARM64 targets.
# For Raspberry Pi OS 32-bit (armhf), use a self-hosted Pi runner or a cross-compile workflow instead.

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        version: [Classic, TBC, WotLK, Cata, Mop]

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          gcc \
          g++ \
          cmake \
          ninja-build \
          zlib1g-dev \
          libssl-dev \
          libpcre3-dev \
          libbz2-dev \
          default-libmysqlclient-dev \
          libmysql++-dev

      - name: Show target platform
        run: |
          uname -a
          dpkg --print-architecture
          gcc --version
          g++ --version
          cmake --version
          ninja --version

      - name: AscEmu Build ${{ matrix.version }}
        run: |
          build_dir="ascemu_build_${{ matrix.version }}_arm64"
          install_dir="$PWD/ascemu_pi_${{ matrix.version }}_arm64"
          mkdir "$build_dir"
          cd "$build_dir"
          cmake ../ \
            -GNinja \
            -DCMAKE_C_COMPILER=/usr/bin/gcc \
            -DCMAKE_CXX_COMPILER=/usr/bin/g++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_WITH_WARNINGS=0 \
            -DBUILD_TOOLS=0 \
            -DASCEMU_VERSION=${{ matrix.version }} \
            -DCMAKE_INSTALL_PREFIX="$install_dir"
          ninja -j"$(nproc)"
          ninja install

      - name: Package Raspberry Pi artifact ${{ matrix.version }}
        run: |
          tar -czf "ascemu-${{ matrix.version }}-linux-arm64-pi.tar.gz" \
          "ascemu_pi_${{ matrix.version }}_arm64"

      - name: Upload Raspberry Pi artifact ${{ matrix.version }}
        uses: actions/upload-artifact@v4
        with:
          name: ascemu-${{ matrix.version }}-linux-arm64-pi
          path: ascemu-${{ matrix.version }}-linux-arm64-pi.tar.gz
          if-no-files-found: error

